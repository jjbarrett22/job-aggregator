  - title: "Associate Director, Product Management – Rx and Vet Diet"
    company: "Chewy"
    summary: >
      Hybrid Bellevue WA, 3-4 days/wk. Owns pharmacy and vet diet
      purchase experience roadmap. Partners with Design, Engineering,
      Finance, and Data Science. Data-driven purchase funnel
      optimization. $166K–$265K. Active application.
    expected_score: 78
    rationale: >
      eCommerce purchase funnel and checkout experience from Nordstrom
      maps strongly. Bellevue hybrid is viable. High comp ceiling.
      Score held back by 3-4 days in office being toward the heavy end,
      pharmacy/healthcare domain gap, and no direct Chewy-specific
      marketplace experience.

  - title: "IT Product Owner, Principal – Head of Product Mobile App"
    company: "PG&E (via recruiter)"
    summary: >
      Remote with Oakland onsite 2 days/month. Contract 12+ months,
      $110–$125/hr W2. Owns product vision, strategy, and delivery for
      a first-of-its-kind utility consumer mobile app. Executive
      influence, hands-on delivery, zero-to-one build. Active
      application.
    expected_score: 68
    rationale: >
      Strong match on mobile app ownership, zero-to-one delivery,
      executive alignment, and consumer digital experience. Contract
      structure and rate are acceptable. Score held back by hard energy/
      utility domain gap (DER, AMI 2.0, grid-edge), and the role
      requires domain expertise that is genuinely absent. Personal
      interest in energy/climate partially offsets.

  - title: "Senior Product Manager, Advertising Data Platforms Compliance"
    company: "Warner Bros. Discovery / HBO Max"
    summary: >
      Hybrid Burbank CA or remote. Owns privacy-preserving advertising
      workflows including data clean rooms, first-party data onboarding,
      identity matching, and attribution. Reports to Sr. Director of
      Privacy, Data Product Compliance. $119K–$221K. Active application.
    expected_score: 61
    rationale: >
      Former employer with deep brand familiarity and CCPA/ADA/WCAG
      compliance pedigree from HBO tenure. Strong cross-functional
      partnership and regulatory roadmap experience. Score held back by
      hard requirement for 2+ years in digital ads ecosystem and data
      clean room experience — genuine gaps. Burbank location also
      requires confirming remote eligibility.

  - title: "Capability Product Manager III"
    company: "Premera Blue Cross"
    summary: >
      Hybrid Mountlake Terrace WA, 3 days/wk. Enterprise product
      ownership for internal capability platforms. Partners with
      business stakeholders and technology teams. Mentors Product
      Owners. $112K–$190K. Active application.
    expected_score: 55
    rationale: >
      Mountlake Terrace hybrid is viable. Enterprise stakeholder
      management and Agile/SAFe experience map well. Score held back
      by internal capability platform scope being lower visibility than
      consumer-facing roles, no direct healthcare experience, and comp
      target being at the lower end of range. Role is a solid fit but
      not an energizing one.

  - title: "VP of Product"
    company: "a Series A startup"
    summary: >
      On-site San Francisco, 5 days/wk. People management of 8 PMs.
      Budget ownership, hiring, performance reviews. Early-stage;
