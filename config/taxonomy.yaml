# --------------------------------------------------------------------
# qol — quality-of-life weights applied by the QoL scorer.
# --------------------------------------------------------------------
qol:
  salary_floor:               175000  # hard walk-away threshold for FTE
  contract_rate_floor_w2:      79     # hard walk-away for W2 contract ($/hr)
  work_mode_remote:             8     # 
  work_mode_hybrid_light:      20     # ≤2 days/wk in Seattle metro
  work_mode_hybrid_moderate:   14     # 3 days/wk in Seattle metro
  work_mode_hybrid_heavy:      20      # 4+ days/wk
  work_mode_onsite_seattle:    20     # on-site Seattle only — possible stretch
  work_mode_onsite_other:       0     # on-site outside Seattle metro — hard no
  crunch_penalty:              22     # "move fast and break things" culture signals
  relocation_penalty:          50     # any role requiring relocation outside Seattle
  management_only_penalty:      6     # pure people management with no IC product scope
  early_stage_penalty:         12     # pre-Series B without established PM discipline
  domain_gap_penalty:          10     # hard domain requirement with no direct experience
  warm_network_bonus:          10     # direct personal connection or former employer
  mission_alignment_bonus:     20     # purpose-driven company matching stated values
  contract_to_perm_bonus:      16     # explicit conversion potential noted in posting
  commute_distance_penalty_per_mile: 0.5
