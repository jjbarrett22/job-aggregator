# =====================================================================
# taxonomy.yaml — classification axes for the filter UI.
#
# Jobs get tagged along three axes:
#   industry        — what sector the role/company is in (multi-value)
#   role_type       — what discipline the job is (multi-value)
#   company_group   — curated affinity bundles (single value, derived
#                     from companies.yaml tier assignments)
#
# Tagging happens at rescore time. Edits here take effect on the next
# deploy + rescore. No Python changes required to add/remove industries.
# =====================================================================

