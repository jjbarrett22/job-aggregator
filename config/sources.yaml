# =====================================================================
# EXAMPLE sources.yaml — scraper plumbing + search content.
#
# This file is [MIXED]:
#   - Scraper PLUMBING (enable flags, poll timings, actor IDs) is
#     shared infrastructure — safe to leave as-is.
#   - Search CONTENT (contact email, LinkedIn search URLs) is personal
#     and MUST be customized before deploy.
#
# Copy this file to `config/sources.yaml`, replace the search content
# marked [USER], then `sam build && sam deploy`.
# =====================================================================

# ----------------------------------------------------------------------
# scraper_defaults — [USER] HTTP etiquette knobs
# ----------------------------------------------------------------------
# contact_email:
#   Embedded into the User-Agent string every scraper sends. Target
#   sites (LinkedIn, Workday tenants, some ATSes) will 403 or 429
#   anonymous user-agents; a real reachable email both stays polite
#   and acts as a practical unblocker.
#
#   REPLACE THE PLACEHOLDER before deploying. The structural test in
#   src/scoring/tests/test_deployed_config.py will fail if this is
#   missing or obviously invalid.
# ----------------------------------------------------------------------
scraper_defaults:
  contact_email: "jjbarrett22@gmail.com"
  user_agent_template: "jobs-aggregator/1.0 (personal use; {email})"

sources:

  # --------------------------------------------------------------------
  # remoteok — . Clean JSON API, no auth.
  # --------------------------------------------------------------------
  remoteok:
    enabled: true
    schedule: "cron(0 6 * * ? *)"   # daily at 06:00 UTC
    endpoint: "https://remoteok.com/api"
    max_jobs_per_run: 500

  # --------------------------------------------------------------------
  # himalayas — . Remote-only job board, JSON.
  # --------------------------------------------------------------------
  himalayas:
    enabled: true
    schedule: "cron(0 6 * * ? *)"
    endpoint: "https://himalayas.app/jobs/api"
    max_jobs_per_run: 500

  # --------------------------------------------------------------------
  # hnhiring — . Hacker News "Who Is Hiring" monthly thread.
  # --------------------------------------------------------------------
  hnhiring:
    enabled: true
    schedule: "cron(0 7 1 * ? *)"   # monthly on the 1st at 07:00 UTC
    algolia_endpoint: "https://hn.algolia.com/api/v1/search_by_date"
    max_jobs_per_run: 300

  # --------------------------------------------------------------------
  # weworkremotely — RSS feed of all remote categories.
  # --------------------------------------------------------------------
  weworkremotely:
    enabled: true
    schedule: "cron(30 6 * * ? *)"
    feed_url: "https://weworkremotely.com/remote-jobs.rss"
    max_jobs_per_run: 500

  # --------------------------------------------------------------------
  # working_nomads — aggregator RSS feed.
  # --------------------------------------------------------------------
  working_nomads:
    enabled: true
    schedule: "cron(30 6 * * ? *)"
    feed_url: "https://www.workingnomads.com/jobsfeed.xml"
    max_jobs_per_run: 300

  # --------------------------------------------------------------------
  # greenhouse / lever / ashby / smartrecruiters / workday
  # ATS scrapers — iterate over companies.yaml entries with matching
  # `ats:` value. Plumbing is shared; the per-company slugs live in
  # companies.yaml.
  # --------------------------------------------------------------------
  greenhouse:
    enabled: true
    schedule: "cron(0 8 ? * MON *)"   # weekly Monday 08:00 UTC
    max_jobs_per_company: 250

  lever:
    enabled: true
    schedule: "cron(0 8 ? * MON *)"
    max_jobs_per_company: 250

  ashby:
    enabled: true
    schedule: "cron(0 8 ? * MON *)"
    max_jobs_per_company: 250

  smartrecruiters:
    enabled: true
    schedule: "cron(0 8 ? * MON *)"
    max_jobs_per_company: 250

  workday:
    enabled: true
    schedule: "cron(0 9 ? * MON *)"
    max_jobs_per_company: 250

  # --------------------------------------------------------------------
  # apify_linkedin — . Daily LinkedIn scrape via Apify
  # (metered, pay-per-result). Token lives in SSM at
  # `/jobs-aggregator/apify_token`.
  #
  # COST WARNING: charges are USD ~$0.005 per result. A wide daily
  # sweep (16 searches × 50 results × 30 days × $0.005) is ~$120/month.
  # Start narrow; scale up after you see the signal.
  # --------------------------------------------------------------------
  apify_linkedin:
    enabled: false
    actor_id: "bebity~linkedin-jobs-scraper"
    ssm_token_param: "apify_token"
    count_per_search: 50
    poll_interval_secs: 6
    poll_timeout_secs: 240
    schedule: "cron(0 12 * * ? *)"   # daily at 12:00 UTC

    # [USER] — REWRITE THESE. Each entry is a LinkedIn job search URL.
    # Build them in a browser:
    #   1. Run the search on linkedin.com/jobs with the filters you want.
    #   2. Copy the URL.
    #   3. Paste it as `url`.
    # Common filter params (documented inline):
    #f_TPR=r86400 — posted within the last 24 hours, keeping results fresh
    #f_WT=2 — remote only
    #f_WT=3 — hybrid (for Seattle-area searches where you'd consider in-office)
    #f_JT=C — contract roles only (used on the contract search)
    #geoId=103644278 — United States (for remote searches)
    #geoId=101812870 — Seattle metropolitan area (for hybrid searches)
    searches:
  - name: "principal_pm_remote_us"
    url: "https://www.linkedin.com/jobs/search/?keywords=%22principal%20product%20manager%22%20OR%20%22staff%20product%20manager%22&f_TPR=r86400&f_WT=2&geoId=103644278"

  - name: "senior_pm_seattle_hybrid"
    url: "https://www.linkedin.com/jobs/search/?keywords=%22senior%20product%20manager%22%20OR%20%22director%20product%20management%22&f_TPR=r86400&f_WT=3&geoId=101812870"

  - name: "technical_pm_mobile_remote"
    url: "https://www.linkedin.com/jobs/search/?keywords=%22technical%20product%20manager%22%20OR%20%22PM-T%22%20mobile&f_TPR=r86400&f_WT=2&geoId=103644278"

  - name: "ecommerce_pm_seattle"
    url: "https://www.linkedin.com/jobs/search/?keywords=%22product%20manager%22%20ecommerce%20OR%20%22purchase%20experience%22%20OR%20%22checkout%22&f_TPR=r86400&f_WT=3&geoId=101812870"

  - name: "consumer_mobile_pm_remote"
    url: "https://www.linkedin.com/jobs/search/?keywords=%22product%20manager%22%20%22consumer%20mobile%22%20OR%20%22mobile%20platform%22%20OR%20%22mobile-first%22&f_TPR=r86400&f_WT=2&geoId=103644278"

  - name: "digital_banking_pm_seattle"
    url: "https://www.linkedin.com/jobs/search/?keywords=%22product%20manager%22%20%22digital%20banking%22%20OR%20%22mobile%20banking%22%20OR%20%22fintech%22&f_TPR=r86400&f_WT=3&geoId=101812870"

  - name: "pm_contract_remote_us"
    url: "https://www.linkedin.com/jobs/search/?keywords=%22product%20manager%22%20OR%20%22product%20owner%22%20contract&f_TPR=r86400&f_WT=2&f_JT=C&geoId=103644278"

  - name: "head_of_product_seattle"
    url: "https://www.linkedin.com/jobs/search/?keywords=%22head%20of%20product%22%20OR%20%22VP%20product%22%20OR%20%22director%20of%20product%22&f_TPR=r86400&f_WT=3&geoId=101812870"

  - name: "regulated_industry_pm_remote"
    url: "https://www.linkedin.com/jobs/search/?keywords=%22product%20manager%22%20%22regulated%22%20OR%20%22compliance%22%20OR%20%22privacy%22%20platform&f_TPR=r86400&f_WT=2&geoId=103644278"

  - name: "marketplace_platform_pm_remote"
    url: "https://www.linkedin.com/jobs/search/?keywords=%22product%20manager%22%20%22marketplace%22%20OR%20%22catalog%22%20OR%20%22taxonomy%22%20OR%20%22seller%20experience%22&f_TPR=r86400&f_WT=2&geoId=103644278"
